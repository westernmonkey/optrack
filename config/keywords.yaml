      - ["Center of Excellence Applied AI Vanderbilt DBMI", "Nashville"]
      - ["VALIANT Vanderbilt Lab Immersive AI Translation", "Nashville"]
      - ["Pittsburgh Health Data Alliance UPMC Pitt CMU", "Pittsburgh"]
      - ["Language Technologies Institute clinical NLP CMU", "Pittsburgh"]
