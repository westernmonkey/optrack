# OpTrack v2 — Opportunity Hunter
# These keywords generate real Google search queries via Serper.dev.
# They are NOT filters — they are the search engine inputs.
#
# Two tracks run in a single pipeline pass:
#   general → events, fellowships, accelerators, demo days, etc.
#   labs    → clinical AI / digital health research labs and their
#             student / research / fellowship opportunities.

# Shared regions used by the weekly type x region sweep (general track).
regions:
  - "Dubai"
  - "UAE"
  - "Chicago"
  - "Midwest"
  - "San Francisco"
  - "Wisconsin"
  - "Milwaukee"
  - "Global"

tracks:
  # ────────────────────────────────────────────────────────────────
  # GENERAL TRACK — events, fellowships, accelerators, demo days
  # ────────────────────────────────────────────────────────────────
  general:
    opportunity_types:
      # Networking events
      - "healthtech networking event"
      - "digital health meetup"
      - "health innovation networking"
      - "healthtech happy hour"
      - "health startup mixer"
      - "clinical AI networking"
      - "medtech networking event"
      - "health tech community event"

      # Demo days & showcases
      - "healthtech demo day"
      - "digital health demo day"
      - "health startup showcase"
      - "healthtech pitch event"
      - "health innovation showcase"
      - "clinical AI demo day"
      - "digital health pitch night"

      # Conferences & summits
      - "healthtech conference"
      - "digital health summit"
      - "health innovation forum"
      - "clinical AI conference"
      - "medtech summit"
      - "health startup conference"
      - "population health summit"
      - "health data conference"
      - "hospital innovation summit"

      # Open calls & early career
      - "healthtech open call"
      - "digital health open call"
      - "health innovation fellowship"
      - "clinical AI fellowship"
      - "health leadership fellowship"
      - "early career health innovator"
      - "health innovation scholarship"
      - "health student program"
      - "emerging health leader program"

    # High-priority combos — always included in the daily light scan
    priority_combos:
      # Chicago (highest priority Midwest hub)
      - ["healthtech networking event", "Chicago"]
      - ["digital health meetup", "Chicago"]
      - ["healthtech demo day", "Chicago"]
      - ["digital health summit", "Chicago"]
      - ["clinical AI conference", "Chicago"]
      - ["hospital innovation summit", "Chicago"]
      - ["clinical informatics conference", "Chicago"]
      - ["healthtech accelerator", "Chicago"]
      - ["health startup investor day", "Chicago"]

      # Wisconsin
      - ["digital health meetup", "Madison"]
      - ["clinical AI meetup", "Madison"]
      - ["health innovation challenge", "Madison"]

      - ["healthtech networking event", "Milwaukee"]
      - ["healthtech conference", "Milwaukee"]
      - ["hospital innovation summit", "Milwaukee"]

      - ["health innovation forum", "Wisconsin"]
      - ["clinical AI conference", "Wisconsin"]
      - ["hospital innovation summit", "Wisconsin"]

      # Minneapolis (strong healthcare ecosystem)
      - ["digital health meetup", "Minneapolis"]
      - ["clinical AI conference", "Minneapolis"]

      # Dubai / UAE
      - ["healthtech networking event", "Dubai"]
      - ["digital health meetup", "Dubai"]
      - ["health innovation forum", "Dubai"]
      - ["clinical AI decision support summit", "Dubai"]
      - ["digital health fellowship", "Dubai"]

      # San Francisco (only high-value opportunities worth traveling for)
      - ["clinical AI conference", "San Francisco"]
      - ["health startup investor day", "San Francisco"]
      - ["healthtech accelerator", "San Francisco"]

      # National opportunities
      - ["clinical AI demo day", "United States"]
      - ["clinical decision support conference", "United States"]
      - ["ambient AI healthcare conference", "United States"]
      - ["clinical workflow automation conference", "United States"]
      - ["health system innovation summit", "United States"]
      - ["CMIO summit", "United States"]
      - ["digital health accelerator", "United States"]
      - ["clinical AI accelerator", "United States"]

      # Founder / pre-idea / entrepreneur programs
      - ["founder in residence healthtech", "United States"]
      - ["entrepreneur in residence healthcare", "United States"]
      - ["healthtech founder fellowship", "Global"]
      - ["digital health founder fellowship", "Global"]
      - ["health startup accelerator program", "United States"]
      - ["healthtech open call", "Global"]

      # Fellowships & emerging leader opportunities
      - ["health innovation fellowship", "Global"]
      - ["clinical AI fellowship", "Global"]
      - ["emerging health leader program", "Global"]

      # Competitions & startup opportunities
      - ["healthtech innovation challenge", "United States"]
      - ["clinical AI startup competition", "United States"]

      # Global catch-all
      - ["clinical AI conference", "Global"]

  # ────────────────────────────────────────────────────────────────
  # LABS TRACK — clinical AI / digital health research labs and the
  # student / research / fellowship opportunities they run.
  # ────────────────────────────────────────────────────────────────
  labs:
    # Query suffixes appended to each lab target. These describe the
    # kind of opportunity we want from a lab (not events).
    opportunity_types:
      - "undergraduate research"
      - "research assistant"
      - "student researcher"
      - "research internship"
      - "summer research program"
      - "research opportunities"
      - "join the lab"
      - "open positions students"
      - "research fellowship"

    # Named labs / centers focused on clinical workflow, CDS, RCM,
    # intake, and documentation AI. Each entry is [lab name, location].
    # These are the anchors for precise lab-track queries.
    targets:
