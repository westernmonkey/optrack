    - "San Francisco"
    - "Bay Area"
    - "SF"
    - "Global"
    - "Virtual"
    - "Online"
    - "Wisconsin"
    - "Milwaukee"

  # Priority order for scoring — fellowships/labs/programs first
  event_types_of_interest:
