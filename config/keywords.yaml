# OpTrack v2 — Opportunity Hunter
# These keywords generate real Google search queries via Serper.dev.
# They are NOT filters — they are the search engine inputs.
#
# Priority (highest → lowest):
#   1) fellowships, scholarships, student programs
#   2) research labs / RA / REU / internships  (labs track)
#   3) open calls / challenges (non-accelerator)
# Networking and conferences are deprioritized — few/no daily queries.
# Incubators/accelerators are intentionally excluded.

